name: Full 25ms Bot (All Commands)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-bot:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install discord.py aiohttp pillow requests

      # ========== CREATE DIRECTORIES ==========
      - name: Create directories
        shell: cmd
        run: |
          mkdir dumps\original dumps\dumped dumps\beautify
          mkdir unobfuscated obfuscated

      # ========== USE EXISTING LUNE.EXE ==========
      - name: Add lune.exe to PATH
        shell: pwsh
        run: |
          $lune = Get-ChildItem -Path . -Recurse -Filter "lune.exe" | Select-Object -First 1
          if ($lune) {
            $dir = $lune.DirectoryName
            echo "$dir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "Found lune.exe in $dir"
          } else {
            Write-Host "lune.exe not found in repo – please add it"
            exit 1
          }

      # ========== USE EXISTING MEDAL.EXE (luau-lifter) ==========
      - name: Add medal.exe to PATH
        shell: pwsh
        run: |
          $medal = Get-ChildItem -Path . -Recurse -Filter "luau-lifter.exe" | Select-Object -First 1
          if (-not $medal) { $medal = Get-ChildItem -Path . -Recurse -Filter "medal.exe" | Select-Object -First 1 }
          if ($medal) {
            $dir = $medal.DirectoryName
            echo "$dir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "Found medal/luau-lifter in $dir"
          } else {
            Write-Host "medal.exe / luau-lifter.exe not found in repo – please add it"
            exit 1
          }

      # ========== DOWNLOAD DARKLUA ==========
      - name: Install darklua
        shell: pwsh
        run: |
          $url = "https://github.com/seaofvoices/darklua/releases/download/v0.18.0/darklua-windows-x86_64.zip"
          Invoke-WebRequest -Uri $url -OutFile darklua.zip -UseBasicParsing
          Expand-Archive -Path darklua.zip -DestinationPath darklua_folder
          $exe = Get-ChildItem -Path darklua_folder -Recurse -Filter "darklua.exe" | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName -Destination "darklua.exe"
            echo "$pwd" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            Write-Host "darklua.exe not found in extracted files"
            exit 1
          }

      # ========== PATCH LUA REQUIRES (fix .l command) ==========
      - name: Patch Lua require paths
        shell: pwsh
        run: |
          $files = @("httplog2.lua","exec_env.lua","MSecAntiTamper.lua","unpack_dumper.lua","badluaobf.lua","luraphdump.lua","loadstringlog.lua")
          foreach ($f in $files) {
            if (Test-Path $f) {
              $content = Get-Content $f -Raw
              $content = $content -replace 'require\("([^@\./][^"]*)"\)', 'require("./$1")'
              Set-Content $f $content -NoNewline
            }
          }

      # ========== RUN THE BOT ==========
      - name: Run Discord bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        shell: cmd
        run: python bot.py
