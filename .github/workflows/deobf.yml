name: Deobfuscate Script

on:
  workflow_dispatch:
    inputs:
      script_url:
        description: 'URL of the obfuscated script'
        required: true
        type: string

jobs:
  deobfuscate:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install aiohttp requests

      - name: Create necessary folders
        shell: cmd
        run: |
          mkdir dumps\original
          mkdir dumps\dumped
          mkdir dumps\beautify
          mkdir unobfuscated
          mkdir obfuscated

      - name: Download the obfuscated script
        shell: cmd
        run: |
          curl -L "${{ github.event.inputs.script_url }}" -o dumps\original\target.lua

      - name: Install Lune
        shell: pwsh
        run: |
          $luneUrl = "https://github.com/lune-org/lune/releases/download/v0.10.4/lune-0.10.4-windows-x86_64.zip"
          $zipPath = "lune.zip"
          Invoke-WebRequest -Uri $luneUrl -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath "lune_folder"
          $lunePath = "$pwd\lune_folder"
          echo "LUNE_PATH=$lunePath" >> $env:GITHUB_ENV
          echo "$lunePath" >> $env:GITHUB_PATH

      - name: Verify Lune installation
        shell: cmd
        run: |
          lune --version

      - name: Run deobfuscator (httplog2)
        shell: cmd
        run: |
          lune run httplog2.lua dumps\original\target.lua

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: deobfuscated-script
          path: ./dumps/dumped/
