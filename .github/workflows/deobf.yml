name: Run Discord Bot

on:
  workflow_dispatch:  # manual trigger
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours (optional auto‑restart)

jobs:
  run-bot:
    runs-on: windows-latest   # need Windows for the .exe binaries
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python deps
        run: pip install discord.py aiohttp pillow

      - name: Install Lune (same as before)
        shell: pwsh
        run: |
          $luneUrl = "https://github.com/lune-org/lune/releases/download/v0.10.4/lune-0.10.4-windows-x86_64.zip"
          Invoke-WebRequest -Uri $luneUrl -OutFile lune.zip -UseBasicParsing
          Expand-Archive -Path lune.zip -DestinationPath lune_folder
          echo "$pwd\lune_folder" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Patch require paths (same as before)
        shell: pwsh
        run: |
          $files = @("httplog2.lua", "exec_env.lua", "MSecAntiTamper.lua")
          foreach ($f in $files) {
            if (Test-Path $f) {
              (Get-Content $f -Raw) -replace 'require\("([^@\./][^"]*)"\)', 'require("./$1")' | Set-Content $f -NoNewline
            }
          }

      - name: Run the bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}   # store your token in GitHub Secrets
        run: |
          python bot.py
        shell: cmd
